spring:
  application:
    name: HealthCare-Platform
  autoconfigure:
    exclude:
      - org.springframework.ai.model.minimax.autoconfigure.MiniMaxChatAutoConfiguration
      - org.springframework.ai.model.minimax.autoconfigure.MiniMaxEmbeddingAutoConfiguration
      - org.springframework.ai.model.minimax.autoconfigure.MiniMaxImageAutoConfiguration
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/healthcare?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      chat:
        enabled: true
        options:
          model: ${OPENROUTER_MODEL:openrouter/free}

# =====================================================
# AI Configuration — OpenRouter via custom provider
# =====================================================
ai:
  # Active provider: openrouter | mock
  provider: ${AI_PROVIDER:openrouter}
  openrouter:
    api-key: ${OPENROUTER_API_KEY}
    base-url: https://openrouter.ai/api/v1
    model: ${OPENROUTER_MODEL:openrouter/free}
    timeout-seconds: 60

  # Context memory — controls how many messages are sent as prompt context
  memory:
    # Maximum recent messages to include in the prompt (prevents huge prompts)
    max-history: 10
    # When total messages exceed this, older messages are replaced with a summary
    summary-threshold: 30
