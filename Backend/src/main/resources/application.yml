spring:
  application:
    name: HealthCare-Platform
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/healthcare?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# =====================================================
# AI Configuration — OpenRouter via custom provider
# =====================================================
ai:
  openrouter:
    api-key: ${OPENROUTER_API_KEY}
    base-url: https://openrouter.ai/api/v1
    model: ${OPENROUTER_MODEL:openrouter/free}
    timeout-seconds: 60
  memory:
    max-history: 10
    summary-threshold: 30
  ocr:
    enabled: ${AI_OCR_ENABLED:true}
    model: ${AI_OCR_MODEL:nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}

# =====================================================
# JWT Configuration
# =====================================================
jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_A_LONG_RANDOM_STRING_AT_LEAST_256_BITS}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 86400000
  remember-me-expiration-ms: 2592000000

# =====================================================
# Prescription storage
# =====================================================
prescription:
  storage-root: ${user.home}/Desktop/HealthCare/healthcare-uploads/prescriptions
  max-file-size: 10485760

# =====================================================
# Logging
# =====================================================
logging:
  level:
    root: INFO
    com.yourpackage: DEBUG
    org.springframework: INFO
    org.hibernate: WARN
  file:
    name: application.log
    path: ${user.home}/Desktop/HealthCare/logs/
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
